<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS 代理可用性测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            padding: 30px 20px;
            color: #1e293b;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.8rem; margin-bottom: 6px; }
        .sub { color: #64748b; margin-bottom: 20px; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin: 16px 0; }
        .btn {
            padding: 10px 24px; border: none; border-radius: 40px;
            font-weight: 600; font-size: 0.95rem; cursor: pointer;
            background: #3b82f6; color: white; transition: 0.2s;
        }
        .btn:hover { background: #2563eb; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.secondary { background: #64748b; }
        .btn.secondary:hover { background: #475569; }
        .proxy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin: 16px 0;
        }
        .proxy-card {
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 16px;
            background: #f8fafc;
            transition: 0.2s;
        }
        .proxy-card h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .proxy-card .badge {
            font-size: 0.7rem;
            background: #e2e8f0;
            padding: 2px 10px;
            border-radius: 20px;
            color: #334155;
        }
        .proxy-card .status {
            font-size: 0.9rem;
            margin: 6px 0;
        }
        .proxy-card .ok { color: #10b981; }
        .proxy-card .err { color: #ef4444; }
        .proxy-card .detail {
            font-size: 0.75rem;
            color: #475569;
            background: #f1f5f9;
            padding: 6px 8px;
            border-radius: 8px;
            margin-top: 6px;
            word-break: break-all;
            max-height: 80px;
            overflow: auto;
        }
        .proxy-card .loading {
            color: #3b82f6;
        }
        .proxy-card .test-btn {
            margin-top: 10px;
            padding: 4px 16px;
            border: 1px solid #3b82f6;
            background: transparent;
            color: #3b82f6;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .proxy-card .test-btn:hover {
            background: #3b82f6;
            color: white;
        }
        .summary {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        .summary strong { color: #0f172a; }
        pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 12px;
            border-radius: 12px;
            overflow: auto;
            max-height: 200px;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .footer {
            margin-top: 20px;
            border-top: 1px solid #e2e8f0;
            padding-top: 16px;
            font-size: 0.9rem;
        }
        .footer code {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌐 CORS 代理可用性测试</h1>
    <p class="sub">测试多个公共 CORS 代理能否成功转发央视 API 请求。<br>点击「全部测试」或单个代理的「测试」按钮，结果会实时显示。</p>

    <div class="btn-group">
        <button id="testAllBtn" class="btn">🚀 全部测试</button>
        <button id="clearBtn" class="btn secondary">🗑️ 清空结果</button>
    </div>

    <div id="proxyGrid" class="proxy-grid"></div>

    <div id="summary" class="summary" style="display:none;"></div>

    <div class="footer">
        <p>✅ 测试通过的代理可配置到爬虫的 <code>PROXY_LIST</code> 中（优先放前面）。</p>
        <p>💡 如果所有代理都失败，请检查网络环境或尝试自建代理。</p>
    </div>
</div>

<script>
    (function() {
        // ========== 目标 API（央视栏目接口） ==========
        const TARGET_URL = 'https://api.cntv.cn/lanmu/columnSearch?fl=&fc=&cid=&p=1&n=20&serviceId=tvcctv&t=json';

        // ========== 代理列表（按优先级排序） ==========
        const PROXY_LIST = [
            { name: 'AllOrigins', url: 'https://api.allorigins.win/raw?url=' },
            { name: 'CorsProxy.io', url: 'https://corsproxy.io/?' },
            { name: 'CorsAnywhere', url: 'https://cors-anywhere.herokuapp.com/' },
            // 可自行增删，注意拼接方式
        ];

        // ========== DOM 引用 ==========
        const grid = document.getElementById('proxyGrid');
        const summaryDiv = document.getElementById('summary');
        const testAllBtn = document.getElementById('testAllBtn');
        const clearBtn = document.getElementById('clearBtn');

        // ========== 构建代理卡片 ==========
        function renderCards() {
            grid.innerHTML = '';
            PROXY_LIST.forEach((proxy, index) => {
                const card = document.createElement('div');
                card.className = 'proxy-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <h3>
                        <span>${proxy.name}</span>
                        <span class="badge">${proxy.url}</span>
                    </h3>
                    <div class="status" id="status-${index}">⏳ 未测试</div>
                    <div class="detail" id="detail-${index}">点击「测试」按钮</div>
                    <button class="test-btn" data-index="${index}">▶️ 测试</button>
                `;
                grid.appendChild(card);
            });
        }

        // ========== 测试单个代理 ==========
        async function testProxy(index) {
            const proxy = PROXY_LIST[index];
            const statusEl = document.getElementById(`status-${index}`);
            const detailEl = document.getElementById(`detail-${index}`);
            const btn = document.querySelector(`.test-btn[data-index="${index}"]`);

            if (!statusEl || !detailEl) return;

            // 禁用按钮，显示加载
            btn.disabled = true;
            statusEl.innerHTML = '<span class="loading">⏳ 测试中...</span>';
            detailEl.textContent = '请求中...';

            // 构建代理 URL
            let proxyUrl = proxy.url;
            let finalUrl;
            if (proxyUrl.includes('{url}')) {
                finalUrl = proxyUrl.replace(/\{url\}/g, encodeURIComponent(TARGET_URL));
            } else if (proxyUrl.endsWith('=') || proxyUrl.endsWith('?')) {
                finalUrl = proxyUrl + encodeURIComponent(TARGET_URL);
            } else {
                // 默认直接拼接（可能不通用，但保留）
                finalUrl = proxyUrl + TARGET_URL;
            }

            const start = Date.now();
            try {
                const xhr = new XMLHttpRequest();
                xhr.open('GET', finalUrl, false);
                xhr.setRequestHeader('Referer', 'https://tv.cctv.com/');
                xhr.setRequestHeader('User-Agent', 'Mozilla/5.0');
                xhr.send();
                const elapsed = Date.now() - start;
                const status = xhr.status;
                const content = xhr.responseText || '';

                if (status >= 200 && status < 300) {
                    // 尝试解析 JSON
                    let jsonOk = false;
                    try {
                        JSON.parse(content);
                        jsonOk = true;
                    } catch(e) {}

                    if (jsonOk) {
                        statusEl.innerHTML = `<span class="ok">✅ 成功 (${status}) - ${elapsed}ms</span>`;
                        // 显示部分数据
                        const preview = content.length > 200 ? content.slice(0, 200) + '...' : content;
                        detailEl.textContent = `响应预览: ${preview}`;
                    } else {
                        statusEl.innerHTML = `<span class="err">⚠️ 返回非JSON (${status}) - ${elapsed}ms</span>`;
                        detailEl.textContent = `响应内容（前200字符）: ${content.slice(0, 200)}`;
                    }
                } else {
                    statusEl.innerHTML = `<span class="err">❌ 失败 (${status}) - ${elapsed}ms</span>`;
                    detailEl.textContent = `响应内容: ${content.slice(0, 200)}`;
                }
            } catch (e) {
                statusEl.innerHTML = `<span class="err">💥 请求异常</span>`;
                detailEl.textContent = `错误: ${e.message}`;
            } finally {
                btn.disabled = false;
                updateSummary();
            }
        }

        // ========== 更新汇总信息 ==========
        function updateSummary() {
            const cards = document.querySelectorAll('.proxy-card');
            let ok = 0, total = cards.length;
            cards.forEach(card => {
                const statusEl = card.querySelector('.status');
                if (statusEl && statusEl.innerHTML.includes('✅')) ok++;
            });
            if (ok > 0) {
                summaryDiv.style.display = 'block';
                summaryDiv.innerHTML = `<strong>✅ 可用的代理:</strong> ${ok} / ${total} 个通过。可优先使用这些。`;
            } else {
                summaryDiv.style.display = 'block';
                summaryDiv.innerHTML = `<strong>⚠️ 暂无代理通过。</strong> 请检查网络或尝试其他代理地址。`;
            }
        }

        // ========== 全部测试 ==========
        async function testAll() {
            testAllBtn.disabled = true;
            testAllBtn.textContent = '⏳ 测试中...';
            for (let i = 0; i < PROXY_LIST.length; i++) {
                await testProxy(i);
                // 加一点延迟避免请求过频
                await new Promise(r => setTimeout(r, 200));
            }
            testAllBtn.disabled = false;
            testAllBtn.textContent = '🔄 全部测试';
        }

        // ========== 清空 ==========
        function clearAll() {
            document.querySelectorAll('.proxy-card').forEach((card, index) => {
                const statusEl = document.getElementById(`status-${index}`);
                const detailEl = document.getElementById(`detail-${index}`);
                if (statusEl) statusEl.innerHTML = '⏳ 未测试';
                if (detailEl) detailEl.textContent = '点击「测试」按钮';
            });
            summaryDiv.style.display = 'none';
        }

        // ========== 事件绑定 ==========
        function bindEvents() {
            // 单个测试按钮（事件委托）
            grid.addEventListener('click', function(e) {
                const btn = e.target.closest('.test-btn');
                if (!btn) return;
                const index = parseInt(btn.dataset.index);
                if (!isNaN(index)) testProxy(index);
            });

            testAllBtn.addEventListener('click', testAll);
            clearBtn.addEventListener('click', clearAll);
        }

        // ========== 初始化 ==========
        renderCards();
        bindEvents();
        // 页面加载后自动执行全部测试（方便快速查看）
        window.addEventListener('load', function() {
            setTimeout(testAll, 300);
        });

        // 暴露手动测试函数到控制台
        window.testProxy = testProxy;
        window.testAll = testAll;
        console.log('💡 可在控制台运行 testAll() 或 testProxy(索引) 进行测试');
    })();
</script>
</body>
</html>
