<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>央视 API CORS 代理测试</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f1f5f9;
            padding: 30px 20px;
            color: #1e293b;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .sub {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }
        .mode-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            align-items: center;
        }
        .mode-group label {
            font-weight: 500;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 40px;
            background: #e2e8f0;
            transition: 0.2s;
            user-select: none;
        }
        .mode-group input[type="radio"] {
            display: none;
        }
        .mode-group input[type="radio"]:checked + label {
            background: #3b82f6;
            color: white;
        }
        .mode-group input[type="radio"]:disabled + label {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 12px;
        }
        .btn:hover { background: #2563eb; }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn.secondary {
            background: #64748b;
        }
        .btn.secondary:hover { background: #475569; }
        .status {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 0.95rem;
        }
        .status .ok { color: #10b981; font-weight: 600; }
        .status .err { color: #ef4444; font-weight: 600; }
        .status .info { color: #3b82f6; }
        .result-area {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 16px;
            overflow: auto;
            max-height: 550px;
            font-family: 'Monaco', 'Menlo', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .result-area .summary {
            color: #94a3b8;
            margin-bottom: 12px;
        }
        .result-area .highlight {
            color: #fbbf24;
        }
        .result-area .error {
            color: #f87171;
        }
        .meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 12px 0 16px;
        }
        .meta-item {
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #475569;
        }
        .meta-item strong { color: #0f172a; }
        .empty-msg {
            color: #94a3b8;
            font-style: italic;
        }
        .proxy-input {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .proxy-input input {
            flex: 1;
            min-width: 200px;
            padding: 8px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .proxy-input input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .proxy-input label {
            font-weight: 500;
            color: #334155;
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .btn { width: 100%; margin-bottom: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📡 央视 API 跨域测试（代理对比）</h1>
    <p class="sub">测试央视 API 是否可访问，对比「直连」和「CORS 代理」两种方式。</p>

    <!-- 模式切换 -->
    <div class="mode-group">
        <input type="radio" name="mode" id="modeDirect" value="direct" checked>
        <label for="modeDirect">🔗 直连（无代理）</label>
        <input type="radio" name="mode" id="modeProxy" value="proxy">
        <label for="modeProxy">🚀 CORS 代理</label>
    </div>

    <!-- 代理地址自定义 -->
    <div class="proxy-input" id="proxySettings" style="display: none;">
        <label for="proxyUrl">代理地址：</label>
        <input type="text" id="proxyUrl" value="https://cors-anywhere.herokuapp.com/" placeholder="例如 https://cors-anywhere.herokuapp.com/">
        <span style="font-size:0.8rem; color:#64748b;">（代理会将请求转发，绕过跨域）</span>
    </div>

    <div>
        <button id="testBtn" class="btn">🚀 发起测试</button>
        <button id="clearBtn" class="btn secondary">🗑️ 清空结果</button>
    </div>

    <div class="meta">
        <span class="meta-item"><strong>API</strong><br>https://api.cntv.cn/lanmu/columnSearch</span>
        <span class="meta-item"><strong>参数</strong><br>fl=&fc=&cid=&p=1&n=20</span>
        <span class="meta-item"><strong>请求头</strong><br>Referer: https://tv.cctv.com/<br>User-Agent: Mozilla/5.0</span>
    </div>

    <div id="status" class="status">⏳ 等待测试...</div>

    <div id="result" class="result-area">
        <span class="empty-msg">暂无数据，点击测试按钮</span>
    </div>
</div>

<script>
    (function() {
        const testBtn = document.getElementById('testBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const proxySettings = document.getElementById('proxySettings');
        const proxyUrlInput = document.getElementById('proxyUrl');
        const modeDirect = document.getElementById('modeDirect');
        const modeProxy = document.getElementById('modeProxy');

        const API_URL = 'https://api.cntv.cn/lanmu/columnSearch?fl=&fc=&cid=&p=1&n=20&serviceId=tvcctv&t=json';

        // 显示/隐藏代理地址输入
        function toggleProxySettings() {
            proxySettings.style.display = modeProxy.checked ? 'flex' : 'none';
        }
        modeDirect.addEventListener('change', toggleProxySettings);
        modeProxy.addEventListener('change', toggleProxySettings);
        toggleProxySettings();

        // 清空结果
        clearBtn.addEventListener('click', function() {
            resultDiv.innerHTML = '<span class="empty-msg">已清空</span>';
            statusDiv.innerHTML = '⏳ 等待测试...';
        });

        // 测试按钮
        testBtn.addEventListener('click', async function() {
            const useProxy = modeProxy.checked;
            const proxyBase = proxyUrlInput.value.trim() || 'https://cors-anywhere.herokuapp.com/';
            let finalUrl = API_URL;
            let modeText = '直连';

            if (useProxy) {
                // 如果代理地址不以 / 结尾，添加 /
                let base = proxyBase.endsWith('/') ? proxyBase : proxyBase + '/';
                // 移除 API_URL 开头的 https://，因为代理通常需要完整 URL
                finalUrl = base + API_URL;
                modeText = 'CORS 代理 (' + base + ')';
            }

            // 禁用按钮
            testBtn.disabled = true;
            testBtn.textContent = '⏳ 请求中...';
            statusDiv.innerHTML = `⏳ 正在通过 <strong>${modeText}</strong> 请求...`;
            resultDiv.innerHTML = '<span class="empty-msg">加载中...</span>';

            try {
                const startTime = Date.now();
                const response = await fetch(finalUrl, {
                    headers: {
                        'Referer': 'https://tv.cctv.com/',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                const elapsed = Date.now() - startTime;

                const statusCode = response.status;
                const statusText = response.statusText;
                const contentType = response.headers.get('content-type') || '';

                // 读取响应文本
                const rawText = await response.text();
                let jsonData = null;
                let parseError = null;
                try {
                    jsonData = JSON.parse(rawText);
                } catch (e) {
                    parseError = e.message;
                }

                // 状态显示
                let statusHtml = '';
                if (response.ok) {
                    statusHtml = `<span class="ok">✅ 请求成功 (${statusCode} ${statusText})</span>`;
                } else {
                    statusHtml = `<span class="err">❌ 请求失败 (${statusCode} ${statusText})</span>`;
                }
                statusHtml += `  |  耗时: ${elapsed}ms  |  Content-Type: ${contentType}`;
                if (parseError) {
                    statusHtml += `  |  ⚠️ JSON 解析错误: ${parseError}`;
                }
                statusHtml += `  |  模式: <strong>${modeText}</strong>`;
                statusDiv.innerHTML = statusHtml;

                // 结果展示
                let resultHtml = '';
                if (jsonData) {
                    const pretty = JSON.stringify(jsonData, null, 2);
                    let summary = '';
                    if (jsonData.response && jsonData.response.docs) {
                        const count = jsonData.response.docs.length;
                        summary = `📋 共找到 <strong>${count}</strong> 个栏目。`;
                        if (count > 0) {
                            const samples = jsonData.response.docs.slice(0, 3).map(d => d.column_name || '未命名').join('、');
                            summary += ` 前3条示例：<span class="highlight">${samples}</span>`;
                        } else {
                            summary += ` <span class="empty-msg">数据为空</span>`;
                        }
                    } else if (jsonData.data && jsonData.data.list) {
                        const count = jsonData.data.list.length;
                        summary = `📋 共找到 <strong>${count}</strong> 条数据 (来自 data.list)。`;
                    } else if (jsonData.error) {
                        summary = `⚠️ 服务端返回错误: ${jsonData.error.message || JSON.stringify(jsonData.error)}`;
                    } else {
                        summary = `📊 响应结构：${Object.keys(jsonData).join(', ')}`;
                    }
                    resultHtml = `<div class="summary">${summary}</div>\n<pre>${pretty}</pre>`;
                } else if (rawText) {
                    const preview = rawText.length > 500 ? rawText.slice(0, 500) + '...\n(已截断)' : rawText;
                    resultHtml = `<div class="error">⚠️ 响应不是 JSON，原始内容（部分）:</div>\n<pre>${escapeHtml(preview)}</pre>`;
                } else {
                    resultHtml = `<span class="empty-msg">⚠️ 服务器返回空内容</span>`;
                }
                resultDiv.innerHTML = resultHtml;

            } catch (error) {
                // 网络错误或跨域
                statusDiv.innerHTML = `<span class="err">❌ 请求异常: ${error.message}</span>`;
                let hint = '';
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    hint = '（很可能是跨域拦截，请尝试使用「CORS 代理」模式）';
                }
                resultDiv.innerHTML = `<div class="error">💥 网络错误或跨域拦截。${hint}</div>`;
                console.error('测试请求异常:', error);
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = '🔄 重新测试';
            }
        });

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // 可选：页面加载后自动测试直连（仅用于演示，用户可手动点击）
        // setTimeout(() => testBtn.click(), 300);
    })();
</script>
</body>
</html>
